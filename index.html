<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>0xsaurav | Terminal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="terminal">
    <div class="output">
      Type commands:
      <span class="command-link">whoami</span>,
      <span class="command-link">about</span>,
      <span class="command-link">projects</span>,
      <span class="command-link">contact</span>,
      <span class="command-link">clear</span>
    </div>
    <br>
  </div>

  <div class="input-line">
    <span class="prompt">root@0xsaurav-exe:~$</span>
    <input id="commandInput" autofocus />
    <span class="cursor"></span>
  </div>

  <script src="script.js"></script>

</body>
</html>
