<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>0xsaurav | Cybersecurity</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="terminal" id="terminal"></div>

<div class="input-line">
  <span>root@0xsaurav-exe:~$</span>&nbsp;
  <input type="text" id="commandInput" autofocus />
</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("commandInput");

function print(text) {
  const p = document.createElement("p");
  p.textContent = text;
  terminal.appendChild(p);
  window.scrollTo(0, document.body.scrollHeight);
}

function handleCommand(cmd) {
  print("root@0xsaurav-exe:~$ " + cmd);

  if (cmd === "whoami") {
    print("0xsaurav-exe");
  } 
  else if (cmd === "about") {
    print("Cybersecurity Trainee focused on VAPT and penetration testing.");
  } 
  else if (cmd === "projects") {
    print("> network-enumeration-lab");
    print("> linux-privilege-escalation");
    print("> web-security-testing");
    print("> steganography-analysis");
  } 
  else if (cmd === "contact") {
    print("LinkedIn: linkedin.com/in/saurav-saini-eh");
    print("TryHackMe: https://tryhackme.com/p/KillerSourav");
    print("GitHub: github.com/0xsaurav-exe");
    print("Email: sauravsaini31609@gmail.com");
  } 
  else if (cmd === "clear") {
    terminal.innerHTML = "";
  } 
  else {
    print("command not found: " + cmd);
  }
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    handleCommand(input.value.trim());
    input.value = "";
  }
});

// Initial message
print("Type commands: whoami, about, projects, contact, clear");
</script>


</body>
</html>
