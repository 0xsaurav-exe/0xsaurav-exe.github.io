<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>0xsaurav | Cybersecurity</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="terminal" id="terminal"></div>

<script>
const lines = [
  { cmd: "whoami", output: "Cybersecurity Trainee | VAPT | Penetration Testing" },
  { cmd: "cat about.txt", output: "Passionate cybersecurity enthusiast focused on ethical hacking, vulnerability assessment, and penetration testing." },
  { cmd: "ls projects/", output: [
      "network-enumeration-lab",
      "linux-privilege-escalation",
      "web-security-testing",
      "steganography-analysis"
    ]
  },
  { cmd: "contact --info", output: [
      "Email: sauravsaini31609@gmail.com",
      "GitHub: github.com/0xsaurav-exe"
    ]
  }
];

let terminal = document.getElementById("terminal");
let lineIndex = 0;
let charIndex = 0;

function typeLine() {
  if (lineIndex >= lines.length) return;

  let line = lines[lineIndex];
  let cmdText = `root@0xsaurav:~$ ${line.cmd}`;

  let p = document.createElement("p");
  terminal.appendChild(p);

  function typeCmd() {
    if (charIndex < cmdText.length) {
      p.innerHTML += cmdText.charAt(charIndex);
      charIndex++;
      setTimeout(typeCmd, 40);
    } else {
      showOutput(line);
    }
  }

  typeCmd();
}

function showOutput(line) {
  if (Array.isArray(line.output)) {
    line.output.forEach(item => {
      let out = document.createElement("p");
      out.textContent = "> " + item;
      terminal.appendChild(out);
    });
  } else {
    let out = document.createElement("p");
    out.textContent = line.output;
    terminal.appendChild(out);
  }

  lineIndex++;
  charIndex = 0;
  setTimeout(typeLine, 500);
}

window.onload = typeLine;
</script>


</body>
</html>
