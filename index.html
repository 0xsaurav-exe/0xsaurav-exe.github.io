<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>0xsaurav | Terminal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="terminal">
    <div class="output">
      Type commands:
      <span class="command-link">whoami</span>,
      <span class="command-link">about</span>,
      <span class="command-link">projects</span>,
      <span class="command-link">contact</span>,
      <span class="command-link">clear</span>
    </div>
    <br>
  </div>

<form id="terminalForm" class="input-line">
  <span class="prompt">root@0xsaurav-exe:~$</span>
  <input id="commandInput" autocomplete="off" autofocus />
  <span class="cursor"></span>
</form>

  <!-- cache fix -->

<script src="script.js?v=10"></script>
</body>
</html>
